tasks:
  be_run:
    cmd: uv run fastapi dev -e kbsb.main:app --reload
    help: run the backend fastapi server
  deploy:
    shell: |
      pushd frontend
      API_URL=https://www.frbe-kbsb-ksb.be/ yarn generate
      popd
      gcloud app deploy
    help: deploy app on google cloud
  fe_build:
    shell: |
      pushd frontend
      yarn
      popd
    help: update frontend installation
  fe_run:
    shell: |
      pushd frontend
      yarn dev
      popd
    help: run yarn dev in frontend
  gcp_init:
    shell: |
      gcloud config configurations activate kbsbprod
      gcloud auth application-default login
    help: activate the gcloud kbsbprod configuration
  i18n:
    cmd:  uv run python -m kbsb.etl.i18n
    help: regenerate i18n files
  requirements:
    cmd: uv export --no-hashes --format requirements-txt -o requirements.txt
    help: create requirements.txt in src directory
shell_interpreter: bash